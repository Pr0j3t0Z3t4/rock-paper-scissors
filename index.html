<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <h1>Faça sua escolha:</h1>
    <button id="rock">Rock</button>
    <button id="paper">Paper</button>
    <button id="scissors">Scissors</button>

    <div id="results" style="margin-top: 20px; font-weight: bold;"></div>
    <div id="score" style="margin-top: 10px;">Placar: User 0 - 0 CPU</div>
    <div id="winner" style="margin-top: 20px; color: red; font-size: 24px;"></div>

    <script src="script.js"></script>
</body>
</html>
